<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Purple gradient background, full bleed -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C6DE0"/>
      <stop offset="100%" stop-color="#4A49C4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- White checkmark -->
  <polyline
    points="22,54 42,72 75,34"
    fill="none"
    stroke="white"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Orange dot with white center -->
  <circle cx="73" cy="31" r="11" fill="#F97316"/>
  <circle cx="73" cy="31" r="4" fill="white"/>
</svg>
